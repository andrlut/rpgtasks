name: Build Android APK

# When to build a fresh APK:
#   - manually, via workflow_dispatch (Run workflow button)
#   - automatically, on push to main when app/package.json changes
#     (a native dep was added/removed/upgraded — OTA can't ship that)
#
# OTA in ci.yml handles JS-only changes; this workflow handles the rest.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
  push:
    branches: [main]
    paths:
      - 'app/package.json'

concurrency:
  group: build-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build APK (${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Trigger EAS build
        working-directory: app
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          echo "Building Android APK with profile: $PROFILE"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --no-wait \
            --message "${{ github.event.head_commit.message || format('manual dispatch by {0}', github.actor) }}"
